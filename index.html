<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gram Shakti - गाँव का डिजिटल पोर्टल</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #1b5e20; --primary-light: #4caf50; --accent: #ff9800; --white: #ffffff; --shadow: 0 10px 25px rgba(0,0,0,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Hind', sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; }
        #app { max-width: 500px; width: 100%; background: #f4f7f6; min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
        
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 40px 20px 50px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: var(--shadow); }
        .logo h1 { font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        .main-tabs { display: flex; margin: -30px 25px 20px; background: white; padding: 8px; border-radius: 20px; box-shadow: var(--shadow); z-index: 1000; position: relative; }
        .main-tabs button { flex: 1; padding: 15px; border: none; background: none; font-size: 1.1rem; font-weight: 700; color: #718096; cursor: pointer; border-radius: 15px; }
        .main-tabs button.active { background: var(--primary); color: white; }

        .tab-content { padding: 0 20px 100px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-bottom: 20px; border-left: 5px solid var(--accent); padding-left: 12px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #333; }
        .input-group input, .input-group select { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 1rem; }
        
        .btn-search { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; font-size: 1.2rem; cursor: pointer; background: linear-gradient(to right, var(--accent), #e68a00); color: white; box-shadow: 0 6px 15px rgba(255, 152, 0, 0.3); }
        .btn-primary { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; font-size: 1.2rem; cursor: pointer; background: linear-gradient(to right, var(--primary), var(--primary-light)); color: white; box-shadow: 0 6px 15px rgba(27, 94, 32, 0.3); }

        #map-container { height: 350px; margin: 20px 0; border-radius: 20px; overflow: hidden; border: 5px solid white; box-shadow: var(--shadow); position: relative; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        .worker-card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.04); border-bottom: 4px solid #eee; }
        .call-btn { background: #25D366; color: white; padding: 12px 22px; border-radius: 50px; text-decoration: none; font-weight: 800; }
        .footer { padding: 30px; text-align: center; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="app">
    <header class="header">
        <div class="logo"><h1>🌾 Gram Shakti</h1></div>
        <p class="tagline">"हर गाँव की हर जरूरत, अब एक ही जगह"</p>
    </header>

    <nav class="main-tabs">
        <button onclick="showTab('search')" id="tab-search" class="active">वर्कर ढूँढें</button>
        <button onclick="showTab('register')" id="tab-register">रजिस्ट्रेशन</button>
    </nav>

    <section id="search-section" class="tab-content">
        <div class="card">
            <div class="input-group">
                <label>पिनकोड (Pincode)</label>
                <input type="text" id="search-pincode" onblur="fetchVillages('search')" placeholder="6 अंकों का कोड">
            </div>
            <div class="input-group">
                <label>गाँव चुनें</label>
                <select id="search-village"><option value="All">सभी गाँव</option></select>
            </div>
            <div class="input-group">
                <label>कैटेगरी</label>
                <select id="search-category" onchange="updateSub('search-category', 'search-sub')"><option value="All">सभी काम</option></select>
            </div>
            <div class="input-group">
                <label>सब-कैटेगरी</label>
                <select id="search-sub"><option value="All">विशिष्ट काम चुनें</option></select>
            </div>
            <button onclick="searchWorkers()" class="btn-search">🔍 सर्च करें</button>
        </div>

        <div id="map-container"><div id="map"></div></div>
        
        <div id="results-list"></div>
    </section>

    <section id="register-section" class="tab-content" style="display:none;">
        <div class="card">
            <h2>नया रजिस्ट्रेशन</h2>
            <form id="register-form">
                <div class="input-group"><label>आपका नाम</label><input type="text" id="reg-name" required></div>
                <div class="input-group"><label>मोबाइल नंबर</label><input type="tel" id="reg-phone" pattern="[0-9]{10}" required></div>
                <div class="input-group"><label>पिनकोड</label><input type="text" id="reg-pincode" onblur="fetchVillages('reg')" required></div>
                <div class="input-group"><label>अपना गाँव चुनें</label><select id="reg-village" required><option value="">पिनकोड डालें</option></select></div>
                <div class="input-group"><label>कैटेगरी</label><select id="reg-category" onchange="updateSub('reg-category', 'reg-sub')"></select></div>
                <div class="input-group"><label>सब-कैटेगरी</label><select id="reg-sub"><option>कैटेगरी चुनें</option></select></div>
                <button type="submit" class="btn-primary" id="reg-submit">रजिस्टर करें</button>
            </form>
        </div>
    </section>

    <footer class="footer"><p>© 2026 ग्राम शक्ति पोर्टल</p></footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

<script>
    // 1. Firebase (अपना Config यहाँ रखें)
    const firebaseConfig = { projectId: "gen-lang-client-0577414319" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. पूरी 22 कैटेगरीज
    const CATS = {
        "1. सरकारी एवं प्रशासन": ["सरपंच", "पटवारी", "सचिव", "पुलिस", "पोस्ट मास्टर"],
        "2. खेती और भारी मशीनरी": ["ट्रैक्टर", "थ्रेशर", "JCB", "बोरवेल", "ड्रोन स्प्रे"],
        "3. पशुपालन और डेयरी": ["पशु डॉक्टर", "AI वर्कर", "डेयरी", "पशु आहार", "चारा कटाई"],
        "4. मिस्त्री और कुशल कारीगर": ["इलेक्ट्रीशियन", "प्लंबर", "राज-मिस्त्री", "बढ़ई", "पेंटर"],
        "5. निर्माण सेवाएँ": ["आर्किटेक्ट", "ठेकेदार", "रेत/बजरी सप्लायर"],
        "6. गाँव का बाज़ार": ["किराना", "सब्जी/फल", "कपड़ा", "आटा चक्की"],
        "7. खाना और ठहरना": ["ढाबा", "होटल", "चाय स्टॉल"],
        "8. परिवहन": ["पिकअप", "ट्रक", "ऑटो", "बाइक मैकेनिक"],
        "9. रिपेयर सेवाएँ": ["TV/AC रिपेयर", "मोटर रिपेयर", "इन्वर्टर/बैटरी"],
        "10. रोज़ाना सेवाएँ": ["नाई", "दर्जी", "मोची", "धोबी"],
        "11. आयोजन (Events)": ["टेंट", "हलवाई", "डीजे", "फोटोग्राफर"],
        "12. स्वास्थ्य और शिक्षा": ["डॉक्टर", "मेडिकल", "एम्बुलेंस", "स्कूल", "कोचिंग"],
        "13. डिजिटल सेवाएँ": ["ई-मित्र", "मोबाइल रिपेयर", "कंप्यूटर", "CCTV"],
        "14. बैंकिंग और फाइनेंस": ["बैंक", "बीमा", "लोन", "मनी ट्रांसफर"],
        "15. सरकारी योजनाएँ": ["पेंशन", "राशन कार्ड", "आयुष्मान कार्ड"],
        "16. बिजली और पानी": ["बिजली विभाग", "जल विभाग", "गैस एजेंसी"],
        "17. प्रॉपर्टी": ["जमीन खरीद-बिक्री", "किराया", "गोदाम"],
        "18. महिला सेवाएँ": ["ब्यूटी पार्लर", "मेहंदी", "सिलाई सेंटर"],
        "19. कानूनी और सुरक्षा": ["वकील", "नोटरी", "जमीन सलाह"],
        "20. सफाई और मजदूरी": ["मजदूर", "सफाई कर्मचारी", "घरेलू काम"],
        "21. मनोरंजन": ["जिम", "गेमिंग", "पार्क"],
        "22. अन्य सेवाएँ": ["कबाड़ी", "पुराना सामान खरीद-बिक्री"]
    };

    let map, markers = [], userMarker;

    window.onload = () => {
        const rc = document.getElementById('reg-category'), sc = document.getElementById('search-category');
        Object.keys(CATS).forEach(c => {
            rc.add(new Option(c, c));
            sc.add(new Option(c, c));
        });
        initMap();
    };

    // सटीक ओपन स्ट्रीट मैप (OpenStreetMap) लॉजिक
    function initMap() {
        if(map) map.remove();
        map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    map.setView([lat, lng], 15);
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker([lat, lng]).addTo(map).bindPopup("<b>आप यहाँ हैं</b>").openPopup();
                },
                () => { console.log("GPS Permission Denied"); },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    }

    function showTab(t) {
        document.getElementById('search-section').style.display = t==='search'?'block':'none';
        document.getElementById('register-section').style.display = t==='register'?'block':'none';
        document.getElementById('tab-search').className = t==='search'?'active':'';
        document.getElementById('tab-register').className = t==='register'?'active':'';
        if(t === 'search') setTimeout(() => map.invalidateSize(), 300);
    }

    function updateSub(cid, sid) {
        const c = document.getElementById(cid).value, s = document.getElementById(sid);
        s.innerHTML = (cid === 'search-category') ? '<option value="All">सभी काम</option>' : '<option>सब-कैटेगरी चुनें</option>';
        if(CATS[c]) CATS[c].forEach(v => s.add(new Option(v, v)));
    }

    async function fetchVillages(type) {
        const p = document.getElementById(type==='reg'?'reg-pincode':'search-pincode').value;
        const sel = document.getElementById(type==='reg'?'reg-village':'search-village');
        if(p.length === 6) {
            sel.innerHTML = '<option>लोड हो रहा है...</option>';
            const res = await fetch(`https://api.postalpincode.in/pincode/${p}`);
            const d = await res.json();
            if(d[0].Status === "Success") {
                sel.innerHTML = type==='reg'?'<option value="">गाँव चुनें</option>':'<option value="All">सभी गाँव</option>';
                d[0].PostOffice.forEach(po => sel.add(new Option(po.Name, po.Name)));
            }
        }
    }

    async function searchWorkers() {
        const p = document.getElementById('search-pincode').value;
        const v = document.getElementById('search-village').value;
        const c = document.getElementById('search-category').value;
        const s = document.getElementById('search-sub').value;
        const list = document.getElementById('results-list');
        list.innerHTML = "खोज रहे हैं...";
        
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        let q = db.collection('listings').where('pincode', '==', p);
        if(v !== 'All') q = q.where('village', '==', v);
        if(c !== 'All') q = q.where('category', '==', c);
        if(s !== 'All' && s !== 'सभी काम') q = q.where('subcategory', '==', s);

        const snap = await q.get();
        list.innerHTML = snap.empty ? "<p style='text-align:center;'>कोई वर्कर नहीं मिला।</p>" : "";
        
        snap.forEach(doc => {
            const w = doc.data();
            list.innerHTML += `<div class="worker-card">
                <div class="worker-info"><h3>${w.name}</h3><p>${w.subcategory} | 📍 ${w.village}</p></div>
                <a href="tel:${w.phone}" class="call-btn">📞 कॉल</a>
            </div>`;
        });
        map.invalidateSize();
    }
</script>
</body>
</html>
